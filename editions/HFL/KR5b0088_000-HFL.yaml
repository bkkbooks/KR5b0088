body:
  text: 上清丹元玉眞帝皇飛仙上經上清紫精君皇初紫靈道君洞房上經上清丹元玉眞帝皇飛仙上經上清丹元玉眞帝皇之道絳臺妙靈瓊華玉妃哺飴之法祕於上清絳臺皇極之宫刻玉書之以授諸應眞人者行其道當潔身逺岫洗心遐林神炁㝠一清齋三十日然乃爲之如是十五年道成爲上清眞人又當陶金製絳以奉經師示不宣之約然後依按修錬以𦤺紫炁下降玉妃登房五臓煥徹百體金固擁形絳雲受書玉皇飛行上清其道每旦視日出時出庭中焚香施席叩齒二十四通次九拜以就位按手兩膝待氣平志定極念日中有流光流霞九百萬丈自日下來洞照我身良乆引取霞精作四十九咽入腹見五内融映表裏光燭神觀紫霞接天無窮即叩齒九通心祝曰元精大神紫霞鬱生金光纏旋灌錬我形尸塵解落與道合神使我洞曉大羅上清次存日下紫霞流光之根有女子形如嬰兒頭作三角雲髻戴絳巾身上著錦華衣蒼玉之珮手執日帝玉眞紫霞之符飛身歩霞來對我前令極心想不得遺却宻祝曰上清丹元絳臺妙靈瓊華玉妃諱鬱洞珠字璟明瑛如是三過曰使我身御紫霞上造日宫飲食玉清與道齊齡次存玉妃以右手援我左手携我形起飛歩紫霞流光之上奔飛日中良乆覺形少熱見我形在日聚光之内即見上清丹元玉眞帝皇坐日中紫雲之上形如嬰兒著紅錦玉衣腰五明月珠口㗸赤日日出九芒芒作紫色紫芒上各綴一玉精形如鷄子大如彈丸光芒垂下長九寸許玉精作紫絳青白黄碧緑紺蒼九色玉精圓動光炁回旋次又存玉妃在帝皇之右我形跪前心九拜祝曰上清丹元玉眞帝皇上眞道君諱龍晶騰字絳㬢漻如是三過即存我以口仰承玉精先自蒼玉始仰承玉精入口中覺少熱即存咽入下丹田次存紺玉之精入丹田中次存緑玉之精安明堂中次存碧玉之精入洞房中存此四玉精懸著定位炯炯如日次紫入左腎女右腎絳入心青入肝白入肺黄入脾令入我五臓玉光交映形神合一叩齒九通存形居帝皇前祝曰靈芒玄化九玉神精日眞帝皇至道之王紫霞激注明堂洞房錬我五臓自生瓊璫寳髓丹液雲翥髙翔忽然忘形在日中合爲一體良乆事竟令不覺在席上依然如日之狀至日中時室中南向大坐按手兩膝思日中有絳霞長九百尺日際流注下接我身光明煥爛存瓊華玉妃手執紫玉之甖飛歩霞上來降我前即存祝諱字依前法如是三過次見玉妃以玉甖著我口存視甖中有黄玉之飴因飲之得九口止心存玉飴勃勃如雲散徹五臓舉身作赤光因祝曰瓊華髙眞日帝之靈持運妙化䇿御神玉甖黄飴啖日之靈華敷五臓遐齡復嬰形棲絳臺長與炁并次存玉妃揖携我形共起登行絳霞之上造日中審見日中有絳玉之臺髙廣千壘中有金床因寢其上玉妃並首南向我形北向因忘形住絳臺中夜半起墠床上向月所在心五拜存月中有白光之霞七百萬丈下接我身霞中有女子頭戴碧英芙蓉冠黄錦衣手執金盤中有神珠如明月冉冉下立我前叩齒六通祝曰月中金眞上清神母諱玥鋈停字湋霓焰如是三過取珠咽之入心中令光炁四徹祝曰金精太素神珠至眞精光宻照蕩清心塵百神化鍊我炁合明願與太上棲形上清次存金眞神母隱形與光與霞一體我亦忘形廓然莫得日帝玉眞紫霞之符朱書青素盛絳囊中佩之又作小符書青箔上月一三五七九十三十五十七十九二十三二十五二十七二十九日各服一東向再拜服送以玄泉玉清自然之文道士行此道至忌穢敗不精盛勤行之十五年受書爲上清眞人得御飛龍從千玉童以出入太極行玉眞帝皇服日中玉精之道玉妃日中黄飴金眞餌服神珠之法道成九玉日精化爲九丹生兆神炁十五年九玉精化爲九色之神龍神朱之精化爲神光之輿舉兆身以登上清也西城總眞王君傳太玄眞人芧君汶水眞人蔡君祕於上清絳臺皇極之宫帝皇玉妃錬仙之節度也上清丹元玉眞帝皇飛仙上經
